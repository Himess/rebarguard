# fly.toml app configuration file generated for rebarguard-api on 2026-04-21T17:25:46+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rebarguard-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  HERMES_CLI_VIA_WSL = 'false'
  HERMES_RUNTIME = 'cli'
  PORT = '8000'
  VISION_BACKEND = 'nous_portal'

[[mounts]]
  source = 'hermes_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 40
    soft_limit = 20

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'get'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
