# Fly.io app config for RebarGuard backend.
# Deploy:
#   fly launch --no-deploy --copy-config   # first time only — keeps this file
#   fly volumes create hermes_data --size 1 --region fra
#   fly secrets set CORS_ORIGINS=https://rebarguard.vercel.app
#   fly deploy
#
# After first deploy, complete Hermes OAuth inside the container:
#   fly ssh console
#   hermes auth add nous --type oauth --no-browser
#   # open the printed URL locally, paste the code, token saves to /data/hermes

app = "rebarguard-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HERMES_RUNTIME = "cli"
  HERMES_CLI_VIA_WSL = "false"
  VISION_BACKEND = "nous_portal"

[mounts]
  source = "hermes_data"
  destination = "/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
